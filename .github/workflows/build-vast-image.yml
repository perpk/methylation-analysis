name: Build and Push Vast.ai ML Image

on:
  # Enables the "on-demand" manual trigger button in GitHub Actions UI
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # This frees up ~30GB by removing tools we don't need for a Docker build
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kpax-vastai-cuda-12.4.1:latest
          # Passing the secure Argon2 hash as a build argument
          build-args: |
            JUPYTER_HASH=${{ secrets.JUPYTER_PASSWORD_HASH }}
          # Utilizes GitHub's cache to dramatically speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
