name: Build and Push Vast.ai ML Image

on:
  workflow_dispatch:
    inputs:
      registry:
        description: 'Choose the destination registry'
        required: true
        default: 'dockerhub'
        type: choice
        options:
          - dockerhub
          - gcp
          - both

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Conditional Authentication Steps ---

      - name: Log in to Docker Hub
        if: ${{ inputs.registry == 'dockerhub' || inputs.registry == 'both' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        if: ${{ inputs.registry == 'gcp' || inputs.registry == 'both' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        if: ${{ inputs.registry == 'gcp' || inputs.registry == 'both' }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP Artifact Registry
        if: ${{ inputs.registry == 'gcp' || inputs.registry == 'both' }}
        # Adjust the region if you created your repo somewhere other than europe-west1
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      # --- Dynamic Tag Generation ---

      - name: Determine Image Tags
        id: set-tags
        run: |
          TAGS=""

          # Add Docker Hub tag if selected
          if [[ "${{ inputs.registry }}" == "dockerhub" || "${{ inputs.registry }}" == "both" ]]; then
            TAGS="${TAGS}${{ secrets.DOCKERHUB_USERNAME }}/kpax-vastai-cuda-12.4.1:latest,"
          fi

          # Add GCP tag if selected
          if [[ "${{ inputs.registry }}" == "gcp" || "${{ inputs.registry }}" == "both" ]]; then
            TAGS="${TAGS}europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/iou-projects-repo/kpax-vastai-cuda-12.4.1:latest,"
          fi

          # Remove the trailing comma required by build-push-action array parsing
          TAGS=${TAGS%,}
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      # --- Build and Push ---

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-ml-cuda/Dockerfile
          push: true
          # Pulls the dynamic list of tags from the previous step
          tags: ${{ steps.set-tags.outputs.tags }}
          build-args: |
            JUPYTER_HASH=${{ secrets.JUPYTER_PASSWORD_HASH }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
