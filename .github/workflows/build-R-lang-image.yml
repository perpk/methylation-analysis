name: Build and Push Vast.ai RStudio Image

on:
  # Keeps the manual "on-demand" trigger
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # Reusing the exact same secrets from your previous workflow
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker-R-lang/Dockerfile
          push: true
          # Using the kpax namespace automatically via the secret
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vast-r-env:latest
          # Utilizes GitHub's cache to speed up subsequent R package compilations
          cache-from: type=gha
          cache-to: type=gha,mode=max
