name: Deploy Interactive Pipeline

on:
  workflow_dispatch:
    inputs:
      execution_mode:
        description: 'Execution Mode'
        required: true
        default: 'run'
        type: choice
        options:
          - run
          - test
      vm_template:
        description: 'GCP Instance Template name (e.g., highmem-template)'
        required: true
        type: string
      image_track:
        description: 'Which analysis track to run?'
        required: true
        type: choice
        options:
          - python
          - r-lang
      docker_registry:
        description: 'Target Docker Registry (e.g., gcr.io/pd-methylation)'
        required: true
        default: 'gcp'
        type: choice
        options:
          - dockerhub
          - gcp
          - both

jobs:
  build_python_image:
    if: ${{ github.event.inputs.image_track == 'python' }}
    uses: ./.github/workflows/build-vast-image.yml
    with:
      registry: ${{ github.event.inputs.docker_registry }}
    secrets: inherit

  build_r_image:
    if: ${{ github.event.inputs.image_track == 'r-lang' }}
    uses: ./.github/workflows/build-R-lang-image.yml
    with:
      registry: ${{ github.event.inputs.docker_registry }}
    secrets: inherit

  deploy_and_run:
    needs: [build_python_image, build_r_image]
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_INFRA_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Interactive VM
        run: |
          # Determine the exact image tag based on the chosen track
          if [ "${{ github.event.inputs.image_track }}" == "python" ]; then
            IMAGE_NAME="${{ github.event.inputs.docker_registry }}/vast-python-env:latest"
          else
            IMAGE_NAME="${{ github.event.inputs.docker_registry }}/vast-r-env:v1"
          fi

          cat << EOF > startup-script.sh
          #!/bin/bash
          set -e

          EXIT_CODE=0

          # Cleanup function: Deletes the VM immediately if we are in 'test' mode
          cleanup() {
            if [ "${{ github.event.inputs.execution_mode }}" == "test" ]; then
              echo "Cleaning up test VM..."
              NAME=\$(curl -s "http://metadata.google.internal/computeMetadata/v1/instance/name" -H "Metadata-Flavor: Google")
              ZONE=\$(curl -s "http://metadata.google.internal/computeMetadata/v1/instance/zone" -H "Metadata-Flavor: Google" | awk -F/ '{print \$4}')
              gcloud compute instances delete \$NAME --zone=\$ZONE --quiet
            fi
          }

          # Ensure cleanup runs whether the script succeeds or fails
          trap cleanup EXIT

          # 1. Install Docker natively on the Debian VM
          apt-get update
          apt-get install -y ca-certificates curl gnupg
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          chmod a+r /etc/apt/keyrings/docker.gpg

          # Properly escaped variables so the VM evaluates them, not GitHub
          echo "deb [arch=\$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian \$(. /etc/os-release && echo "\$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null

          apt-get update
          apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

          # 2. Authenticate Docker for GCP Artifact Registry
          gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

          # 3. Setup Ops Agent and Host Directories
          mkdir -p /var/log/methylation /workspace/results
          chmod 777 /var/log/methylation /workspace/results

          curl -sSO https://dl.google.com/cloudagents/add-google-cloud-ops-agent-repo.sh
          bash add-google-cloud-ops-agent-repo.sh --also-install

          cat << 'CONFIG' > /etc/google-cloud-ops-agent/config.yaml
          logging:
            receivers:
              pipeline_logs:
                type: files
                include_paths:
                  - /var/log/methylation/*.log
            service:
              pipelines:
                custom_pipeline:
                  receivers: [pipeline_logs]
          CONFIG
          systemctl restart google-cloud-ops-agent

          # 4. Pull the image
          echo "Pulling image: \$IMAGE_NAME"
          if ! docker pull \$IMAGE_NAME; then
            echo "ERROR: Failed to pull image. Check Artifact Registry permissions."
            EXIT_CODE=1
            exit \$EXIT_CODE
          fi

          # 5. Spin up the container based on execution mode
          if [ "${{ github.event.inputs.execution_mode }}" == "test" ]; then
            # TEST MODE: Instantly validates run permissions, then exits (triggering trap cleanup)
            if ! docker run --name test-runner \$IMAGE_NAME /bin/true; then
              echo "ERROR: Container failed to start."
              EXIT_CODE=1
              exit \$EXIT_CODE
            fi
          else
            # RUN MODE: Starts container in background for manual SSH access
            docker run -d \\
              --name pipeline-runner \\
              --shm-size=16g \\
              -p 2222:22 -p 8080:8080 \\
              -v /var/log/methylation:/workspace/methylation-analysis/logs \\
              -v /workspace/results:/workspace/results \\
              \$IMAGE_NAME
          fi
          EOF

          gcloud compute instances create ephemeral-pipeline-vm \
            --source-instance-template=${{ github.event.inputs.vm_template }} \
            --zone=europe-west1-b \
            --metadata-from-file=startup-script=startup-script.sh
